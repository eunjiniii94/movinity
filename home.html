<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>홈 화면</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <script src="js/script.js"></script>
  </head>
  <body>
    <section class="home">
      <div class="status-bar">
        <img src="assets/icons/Status Bar.svg" alt="" />
      </div>
      <header class="home-header">
        <h1 class="home-title">홈</h1>
        <button type="button" class="alarm-btn">
          <img src="assets/icons/bell.png" alt="알림" />
        </button>
      </header>

      <main class="home-main">
        <section class="hero-banner">
          <img
            src="assets/icons/blurgosul.png"
            alt="블러고슬"
            class="hero-banner-image"
          />
          <div class="hero-banner-content">
            <img src="assets/icons/gosul.png" alt="고슬" class="hero-poster" />
            <div class="hero-text">
              <h2 class="hero-title">프로젝트 헤일메리</h2>
              <p class="hero-desc">
                평가함
                <img src="assets/icons/star.svg" alt="" class="star-icon" /> 5.0
                · SF· 미국
              </p>
            </div>
          </div>
        </section>

        <section class="quick-menu">
          <button type="button" class="quick-item recommend btn">
            <img src="assets/icons/recommend.svg" alt="" class="quick-icon" />
            <span>영화추천</span>
          </button>

          <button type="button" class="quick-item upcoming-btn">
            <img src="assets/icons/calendar.svg" alt="" class="quick-icon" />
            <span>개봉예정</span>
          </button>

          <button type="button" class="quick-item community-btn">
            <img src="assets/icons/bubble-fill.svg" alt="" class="quick-icon" />
            <span>커뮤니티</span>
          </button>

          <button type="button" class="quick-item news-btn">
            <img src="assets/icons/news.svg" alt="" class="quick-icon" />
            <span>영화소식</span>
          </button>
        </section>
        <section class="movie-section">
          <div class="section-header">
            <h2 class="section-title">개봉 영화 순위</h2>
            <button type="button" class="section-more-btn">
              <img
                src="assets/icons/chevron-right.png"
                alt="더보기"
                class="section-more-icon"
              />
            </button>
          </div>
          <div class="movie-list">
            <article class="movie-card">
              <div class="movie-thumbnail">
                <img
                  src="assets/icons/kokuho.png"
                  alt="국보"
                  class="movie-poster"
                />
                <img src="assets/icons/one.svg" alt="" class="movie-rank" />
              </div>
              <h3 class="movie-title">국보</h3>
              <p class="movie-info">
                평가함<img
                  src="assets/icons/star.svg"
                  alt=""
                  class="star-icon"
                />5.0
              </p>
            </article>

            <article class="movie-card">
              <div class="movie-thumbnail">
                <img
                  src="assets/icons/sinners.png"
                  alt="씨너스"
                  class="movie-poster"
                />
                <img src="assets/icons/two.svg" alt="" class="movie-rank" />
              </div>
              <h3 class="movie-title">씨너스</h3>
            </article>

            <article class="movie-card">
              <div class="movie-thumbnail">
                <img
                  src="assets/icons/f1.png"
                  alt="에프원"
                  class="movie-poster"
                />
                <img src="assets/icons/three.svg" alt="" class="movie-rank" />
              </div>
              <h3 class="movie-title">에프원</h3>
            </article>

            <article class="movie-card">
              <div class="movie-thumbnail">
                <img
                  src="assets/icons/f1.png"
                  alt="에프원"
                  class="movie-poster"
                />
                <img src="assets/icons/three.svg" alt="" class="movie-rank" />
              </div>
              <h3 class="movie-title">에프원</h3>
            </article>
          </div>
        </section>

        <section class="upcoming-section">
          <div class="section-header">
            <h2 class="section-title">개봉예정작</h2>
            <button type="button" class="section-more-btn">
              <img
                src="assets/icons/chevron-right.png"
                alt="더보기"
                class="section-more-icon"
              />
            </button>
          </div>

          <div class="movie-list">
            <article class="upcoming-card">
              <div class="upcoming-thumbnail">
                <img
                  src="assets/icons/brutal.png"
                  alt="브루탈"
                  class="movie-poster"
                />

                <div class="upcoming-overlay">
                  <button type="button" class="wish-btn">
                    <img
                      src="assets/icons/Plus.svg"
                      alt="찜하기"
                      class="wish-icon"
                    />
                  </button>
                  <span class="wish-count">42.5K</span>
                </div>
              </div>
              <h3 class="movie-title">브루탈리스트</h3>
              <p class="upcoming-date">2026. 04. 10</p>
            </article>

            <article class="upcoming-card">
              <div class="upcoming-thumbnail">
                <img
                  src="assets/icons/benicio.png"
                  alt="페니키안 스킴"
                  class="movie-poster"
                />

                <div class="upcoming-overlay">
                  <button type="button" class="wish-btn">
                    <img
                      src="assets/icons/Plus.svg"
                      alt="찜하기"
                      class="wish-icon"
                    />
                  </button>
                  <span class="wish-count">42.5K</span>
                </div>
              </div>
              <h3 class="movie-title">페니키안 스킴</h3>
              <p class="upcoming-date">2026. 04. 10</p>
            </article>

            <article class="upcoming-card">
              <div class="upcoming-thumbnail">
                <img
                  src="assets/icons/mickey.png"
                  alt="미키17"
                  class="movie-poster"
                />

                <div class="upcoming-overlay">
                  <button type="button" class="wish-btn">
                    <img
                      src="assets/icons/Plus.svg"
                      alt="찜하기"
                      class="wish-icon"
                    />
                  </button>
                  <span class="wish-count">42.5K</span>
                </div>
              </div>
              <h3 class="movie-title">미키17</h3>
              <p class="upcoming-date">2026. 04. 10</p>
            </article>

            <article class="upcoming-card">
              <div class="upcoming-thumbnail">
                <img
                  src="assets/icons/sentimental.png"
                  alt="센밸"
                  class="movie-poster"
                />

                <div class="upcoming-overlay">
                  <button type="button" class="wish-btn">
                    <img
                      src="assets/icons/Plus.svg"
                      alt="찜하기"
                      class="wish-icon"
                    />
                  </button>
                  <span class="wish-count">42.5K</span>
                </div>
              </div>
              <h3 class="movie-title">센티멘탈 밸류</h3>
              <p class="upcoming-date">2026. 04. 10</p>
            </article>
          </div>
        </section>
      </main>
    </section>
  </body>
</html>
