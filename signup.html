<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 페이지</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <section class="signup-page">
      <div class="status-bar">
        <img src="assets/icons/Status Bar.svg" alt="" />
      </div>
      <h1 class="signup-title heading-3">회원가입</h1>

      <form class="signup-form">
        <div class="form-group">
          <label for="email" class="form-label">이메일</label>
          <input
            type="email"
            id="email"
            class="form-input is-active"
            placeholder="user@example.com"
          />
        </div>
        <div class="form-group">
          <label for="password" class="form-label">비밀번호</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="특수기호 포함(#, %, @ 등) 비밀번호 8자리를 입력 해 주세요."
          />
        </div>
        <div class="form-group">
          <label for="password-check" class="form-label">비밀번호 확인</label>
          <input
            type="password"
            id="password-check"
            class="form-input"
            placeholder="비밀번호 확인"
          />
        </div>
        <div class="form-group">
          <label for="name" class="form-label">이름</label>
          <input
            type="text"
            id="name"
            class="form-input"
            placeholder="이름을 입력 해 주세요."
          />
        </div>
      </form>
    </section>
  </body>
</html>
