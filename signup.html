<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 페이지</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <section class="signup-page">
      <div class="status-bar">
        <img src="assets/icons/Status Bar.svg" alt="" />
      </div>
      <h1 class="signup-title heading-3">회원가입</h1>

      <form class="signup-form">
        <div class="form-group">
          <label for="email" class="form-label">이메일</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="user@example.com"
          />
          <p class="email-message"></p>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">비밀번호</label>
          <div class="password-wrap">
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="특수기호 포함(#, %, @ 등) 비밀번호 8자리를 입력 해 주세요."
            />
            <button
              type="button"
              class="toggle-password"
              data-target="password"
            >
              <img
                src="assets/icons/eyeclose.svg"
                alt="비밀번호 보기"
                class="eye-icon"
              />
            </button>
          </div>
          <p class="password-rule-message"></p>
        </div>

        <div class="form-group">
          <label for="password-check" class="form-label">비밀번호 확인</label>
          <div class="password-wrap">
            <input
              type="password"
              id="password-check"
              class="form-input"
              placeholder="비밀번호 확인"
            />
            <button
              type="button"
              class="toggle-password"
              data-target="password-check"
            >
              <img
                src="assets/icons/eyeclose.svg"
                alt="비밀번호 보기"
                class="eye-icon"
              />
            </button>
          </div>
          <p class="password-message"></p>
        </div>

        <div class="form-group">
          <label for="name" class="form-label">이름</label>
          <input
            type="text"
            id="name"
            class="form-input"
            placeholder="이름을 입력 해 주세요."
          />
        </div>
        <div class="form-group">
          <label for="birth" class="form-label">생년월일</label>
          <input
            type="text"
            id="birth"
            class="form-input"
            placeholder="8자리 숫자(YYYY/MM/DD)를 입력 해 주세요."
          />
          <p class="birth-message"></p>
        </div>
        <div class="form-group">
          <label for="phone" class="form-label">휴대폰 인증</label>
          <div class="input-row">
            <input
              type="text"
              id="phone"
              class="form-input"
              placeholder="'-' 제외 숫자만 입력"
            />
            <button type="button" class="form-btn send-btn" disabled>
              인증번호 발송
            </button>
          </div>
          <p class="phone-message"></p>
        </div>
        <div class="form-group">
          <label for="code" class="form-label">인증번호 입력</label>
          <div class="input-row">
            <input
              type="text"
              id="code"
              class="form-input"
              placeholder="인증번호를 입력 해 주세요."
            />
            <button type="button" class="form-btn check-btn" disabled>
              인증번호 확인
            </button>
          </div>
        </div>
        <button type="submit" class="submit-btn" disabled>회원가입 완료</button>
      </form>
    </section>
  </body>
</html>
