<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>영화 커뮤니티 앱</title>

    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <script src="js/script.js"></script>
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <div class="login-wrap">
          <section class="hero">
            <h1 class="heading-3 login-title">로그인</h1>
            <div class="hero-content">
              <div class="logo">
                <img src="assets/icons/logo.svg" alt="로고" class="hero-logo" />
              </div>
            </div>
            <p class="hero-text caption">
              영화를 보고,<br />
              함께 이야기 하는 커뮤니티
            </p>
          </section>
          <section class="login-actions">
        <button class="login-btn kakao">
          <img src="assets/icons/kakao.png" alt="#" class="btn-icon">
          <span>카카오로 계속하기</span>
        </button>
        <button class="login-btn google">
          <img src="assets/icons/google2.svg" alt="#" class="btn-icon">
          <span>구글로 계속하기</span>
        </button>
              <button class="login-btn email">
          <img src="assets/icons/email.svg" alt="#" class="btn-icon">
          <span>이메일로 회원가입</span>
        </button>
             <button class="login-btn option">
          
          <span>옵션 더보기</span>
        </button>
            </div>
          </section>
        </div>
      </div>
    </div>
  </body>
</html>
