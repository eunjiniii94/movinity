<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>온보딩</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <script src="js/script.js" defer></script>
  </head>

  <body>
    <section class="onboarding">
      <div class="status-bar">
        <img src="assets/icons/Status Bar.svg" alt="" />
      </div>

      <img src="assets/icons/movinity.svg" alt="" class="onboarding-logo" />

      <h1 class="heading-2 onboarding-title">오늘은 어떤 영화를 보셨나요?</h1>
      <p class="body onboarding-text">함께 이야기 하는 커뮤니티</p>
      <div class="onboarding-actions">
        <button class="signup">
          <span>로그인 또는 회원가입</span>
        </button>
        <button class="guest">
          <span>게스트로 계속하기</span>
        </button>
      </div>
    </section>
  </body>
</html>
